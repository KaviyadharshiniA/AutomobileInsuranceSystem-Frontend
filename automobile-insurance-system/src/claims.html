<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Claims</title>

    <link rel="stylesheet"
    href="css/style.css">

    <link rel="stylesheet"
    href="css/dashboard.css">

    <link rel="stylesheet"
    href="css/forms.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <div class="logo-circle">
                A
            </div>

            <h2>
                AegisDrive
            </h2>

        </div>

        <ul class="sidebar-links">

            <li>
                <a href="user-dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="policies.html">
                    Policies
                </a>
            </li>

            <li>
                <a href="proposal.html">
                    Proposal
                </a>
            </li>

            <li>
                <a href="claims.html">
                    Claims
                </a>
            </li>

            <li>
                <a href="payments.html">
                    Payments
                </a>
            </li>

            <li>
                <a href="profile.html">
                    Profile
                </a>
            </li>

            <li>
                <a href="#"
                onclick="logout()">

                    Logout

                </a>
            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="dashboard-main">

        <h1>
            Submit Claim
        </h1>

        <div class="form-card">

            <form id="claimForm">

                <div class="form-group">

                    <label>
                        Claim Reason
                    </label>

                    <input
                    type="text"
                    id="claimReason"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        Claim Description
                    </label>

                    <textarea
                    id="claimDescription"
                    required>
                    </textarea>

                </div>

                <div class="form-group">

                    <label>
                        Claim Status
                    </label>

                    <select
                    id="claimStatus"
                    required>

                        <option value="">
                            Select Status
                        </option>

                        <option value="PENDING">
                            PENDING
                        </option>

                        <option value="APPROVED">
                            APPROVED
                        </option>

                        <option value="REJECTED">
                            REJECTED
                        </option>

                    </select>

                </div>

                <button
                type="submit"
                class="btn btn-primary">

                    Submit Claim

                </button>

            </form>

        </div>

    </main>

</div>

<script src="js/dashboard.js"></script>
<script src="js/claims.js"></script>

</body>
</html>
