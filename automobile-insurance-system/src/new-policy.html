<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>New Policy</title>

    <link rel="stylesheet"
    href="css/style.css">

    <link rel="stylesheet"
    href="css/dashboard.css">

    <link rel="stylesheet"
    href="css/forms.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <div class="logo-circle">
                A
            </div>

            <h2>
                AegisDrive
            </h2>

        </div>

        <ul class="sidebar-links">

            <li>
                <a href="user-dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="policies.html">
                    Policies
                </a>
            </li>

            <li>
                <a href="proposal.html">
                    Proposal
                </a>
            </li>

            <li>
                <a href="claims.html">
                    Claims
                </a>
            </li>

            <li>
                <a href="payments.html">
                    Payments
                </a>
            </li>

            <li>
                <a href="profile.html">
                    Profile
                </a>
            </li>

            <li>
                <a href="#"
                onclick="logout()">

                    Logout

                </a>
            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="dashboard-main">

        <h1>
            Create New Policy
        </h1>

        <div class="form-card">

            <form id="policyForm">

                <div class="form-group">

                    <label>
                        Policy Name
                    </label>

                    <input
                    type="text"
                    id="policyName"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        Description
                    </label>

                    <textarea
                    id="description"
                    required>
                    </textarea>

                </div>

                <div class="form-group">

                    <label>
                        Package Type
                    </label>

                    <select
                    id="packageType"
                    required>

                        <option value="">
                            Select Package
                        </option>

                        <option value="BASIC">
                            BASIC
                        </option>

                        <option value="PREMIUM">
                            PREMIUM
                        </option>

                        <option value="ULTIMATE">
                            ULTIMATE
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Premium Amount
                    </label>

                    <input
                    type="number"
                    id="premiumAmount"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        Add Ons
                    </label>

                    <input
                    type="text"
                    id="addOns"
                    placeholder=
                    "Roadside Assistance, Zero Depreciation"
                    required>

                </div>

                <button
                type="submit"
                class="btn btn-primary">

                    Save Policy

                </button>

            </form>

        </div>

    </main>

</div>

<script src="js/dashboard.js"></script>
<script src="js/policies.js"></script>

</body>
</html>
