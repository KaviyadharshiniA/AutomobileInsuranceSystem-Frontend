<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Register | AegisDrive</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>

<div class="container">

    <nav class="navbar">

        <div class="logo">

            <div class="logo-circle">
                A
            </div>

            <h2>
                AegisDrive
            </h2>

        </div>

    </nav>

</div>

<section class="auth-section">

    <div class="auth-container">

        <!-- LEFT -->

        <div class="auth-left">

            <span class="hero-badge">
                🚘 Join AegisDrive
            </span>

            <h1>
                Smart Insurance
                Starts Here
            </h1>

            <p>
                Create your account
                and get insured instantly.
            </p>

            <img
            src="assets/car.png"
            class="login-car">

        </div>

        <!-- RIGHT -->

        <div class="auth-card">

            <h2>
                Create Account
            </h2>

            <p>
                Fill all required details
            </p>

            <form id="registerForm">

                <div class="input-group">

                    <label>
                        Full Name
                    </label>

                    <input
                    type="text"
                    id="name"
                    required>

                </div>

                <div class="input-group">

                    <label>
                        Email
                    </label>

                    <input
                    type="email"
                    id="email"
                    required>

                </div>

                <div class="input-group">

                    <label>
                        Password
                    </label>

                    <input
                    type="password"
                    id="password"
                    required>

                </div>

                <div class="input-group">

                    <label>
                        Date of Birth
                    </label>

                    <input
                    type="date"
                    id="dob"
                    required>

                </div>

                <div class="input-group">

                    <label>
                        Age
                    </label>

                    <input
                    type="number"
                    id="age"
                    required>

                </div>

                <div class="input-group">

                    <label>
                        Aadhaar Number
                    </label>

                    <input
                    type="text"
                    id="aadhaar"
                    required>

                </div>

                <div class="input-group">

                    <label>
                        PAN Number
                    </label>

                    <input
                    type="text"
                    id="pan"
                    required>

                </div>

                <div class="input-group">

                    <label>
                        Address
                    </label>

                    <textarea
                    id="address"
                    required>
                    </textarea>

                </div>

                <div class="input-group">

                    <label>
                        Role
                    </label>

                    <select
                    id="role">

                        <option value="USER">
                            USER
                        </option>

                        <option value="ADMIN">
                            ADMIN
                        </option>

                    </select>

                </div>

                <button
                type="submit"
                class="btn btn-primary login-btn">

                    Register

                </button>

            </form>

            <div class="auth-footer">

                Already have account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </div>

</section>

<script src="js/auth.js"></script>

</body>
</html>
