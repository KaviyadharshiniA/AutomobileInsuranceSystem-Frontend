<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Payments</title>

    <link rel="stylesheet"
    href="css/style.css">

    <link rel="stylesheet"
    href="css/dashboard.css">

    <link rel="stylesheet"
    href="css/forms.css">
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <div class="logo-circle">
                A
            </div>

            <h2>
                AegisDrive
            </h2>

        </div>

        <ul class="sidebar-links">

            <li>
                <a href="user-dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="policies.html">
                    Policies
                </a>
            </li>

            <li>
                <a href="proposal.html">
                    Proposal
                </a>
            </li>

            <li>
                <a href="claims.html">
                    Claims
                </a>
            </li>

            <li>
                <a href="payments.html">
                    Payments
                </a>
            </li>

            <li>
                <a href="profile.html">
                    Profile
                </a>
            </li>

            <li>
                <a href="#"
                onclick="logout()">

                    Logout

                </a>
            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="dashboard-main">

        <h1>
            Payment Details
        </h1>

        <div class="form-card">

            <form id="paymentForm">

                <div class="form-group">

                    <label>
                        Amount
                    </label>

                    <input
                    type="number"
                    id="amount"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        Payment Method
                    </label>

                    <select
                    id="paymentMethod"
                    required>

                        <option value="">
                            Select Method
                        </option>

                        <option value="UPI">
                            UPI
                        </option>

                        <option value="CARD">
                            CARD
                        </option>

                        <option value="NET_BANKING">
                            NET BANKING
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Payment Date
                    </label>

                    <input
                    type="date"
                    id="paymentDate"
                    required>

                </div>

                <div class="form-group">

                    <label>
                        Payment Status
                    </label>

                    <select
                    id="paymentStatus"
                    required>

                        <option value="">
                            Select Status
                        </option>

                        <option value="SUCCESS">
                            SUCCESS
                        </option>

                        <option value="FAILED">
                            FAILED
                        </option>

                        <option value="PENDING">
                            PENDING
                        </option>

                    </select>

                </div>

                <button
                type="submit"
                class="btn btn-primary">

                    Make Payment

                </button>

            </form>

        </div>

    </main>

</div>

<script src="js/dashboard.js"></script>
<script src="js/payments.js"></script>

</body>
</html>
